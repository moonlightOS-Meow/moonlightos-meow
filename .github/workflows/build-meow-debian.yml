name: 🍋 UNACCEPTABLE MOONLIGHTOS MEOW V6.0 ISO CONSTRUCTION

on:
  workflow_dispatch:
    inputs:
      compression:
        description: 'SQUASHFS COMPRESSION! CHOOSE OR BE DESTROYED!'
        required: true
        default: 'xz'
        type: choice
        options:
          - xz
          - zstd
          - lz4
      extra_packages:
        description: 'EXTRA PACKAGES?! MORE FILTH FOR THE CASTLE?!'
        required: false
        default: ''
      upload_artifact:
        description: 'UPLOAD THE ARTIFACT TO MY CHAMBERS?!'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    name: 🔨 CRUSH THE DEBIAN LIVE ISO INTO EXISTENCE
    runs-on: ubuntu-latest

    steps:
      - name: 🍋 GRAB THE CODE BY ITS THROAT
        uses: actions/checkout@v4
        with:
          ref: meow-debian

      - name: 🍋 INSTALL THE TOOLS OF MY SUFFERING
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso

      - name: 🍋 STUFF THE EXTRA PACKAGES INTO THE CHROOT VOID
        if: ${{ github.event.inputs.extra_packages != '' }}
        run: |
          echo "" >> live-build/config/package-lists/meow.list.chroot
          echo "# EXTRA FILTH FROM THE DISPATCHER" >> live-build/config/package-lists/meow.list.chroot
          for pkg in ${{ github.event.inputs.extra_packages }}; do
            echo "$pkg" >> live-build/config/package-lists/meow.list.chroot
          done

      - name: 🍋 CONFIGURE THE LIVE-BUILD! SUBMIT!
        working-directory: live-build
        run: |
          sudo lb config noauto \
            --distribution trixie \
            --system live \
            --bootloader grub-efi \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --security true \
            --mirror-chroot-security "http://deb.debian.org/debian-security/" \
            --archive-areas "main contrib non-free non-free-firmware" \
            --linux-flavours amd64 \
            --linux-packages linux-image \
            --debian-installer live \
            --debian-installer-gui true \
            --bootappend-live "boot=live components quiet splash" \
            --binary-image iso-hybrid \
            --iso-volume "moonlightOS-Meow-v6" \
            --compression ${{ github.event.inputs.compression }}

      - name: 🍋 BUILD! BUILD! BUILLLLLLLDDDDDDD!
        working-directory: live-build
        run: sudo lb build

      - name: 🍋 RENAME THE ISO (AS YOU COMMANDED, HMPH!)
        run: |
          ISO=$(find live-build -name "*.iso" | head -1)
          NEW_NAME="moonlightos-meow-v6.0-lucyfers-resurrection-$(date +%Y%m%d)-amd64.iso"
          sudo mv "$ISO" "$NEW_NAME"
          echo "ISO_NAME=$NEW_NAME" >> $GITHUB_ENV
          sha256sum "$NEW_NAME" > "${NEW_NAME}.sha256"
          echo "✅ IT IS DONE! SILENCE!: $NEW_NAME"
          ls -lh "$NEW_NAME"
          cat "${NEW_NAME}.sha256"

      - name: 🍋 UPLOAD THE MEOW-FILE TO THE DUNGEON
        if: ${{ github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlightos-meow-v6.0-${{ github.run_number }}
          path: |
            moonlightos-meow-v6.0-*.iso
            moonlightos-meow-v6.0-*.sha256
          retention-days: 7
