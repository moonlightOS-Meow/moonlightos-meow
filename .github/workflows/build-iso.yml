name: Build moonlightOS Meow ISO

on:
  workflow_dispatch:
    inputs:
      iso_version:
        description: 'ISO version'
        required: true
        default: '5.0'
      extra_packages:
        description: 'Extra packages to add (space-separated)'
        required: false
        default: ''
      compression:
        description: 'Squashfs compression'
        required: true
        default: 'xz'
        type: choice
        options:
          - xz
          - zstd
          - lz4
      upload_artifact:
        description: 'Upload ISO as artifact'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v5.0-meow

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git sudo dosfstools e2fsprogs libisoburn squashfs-tools

      - name: Inject build inputs
        run: |
          echo "=== Injecting build parameters ==="

          # Create clean profiledef.sh with proper quoting
          cat > profiledef.sh << 'EOF'
#!/usr/bin/env bash
# shellcheck disable=SC2034

iso_name="mos-meow"
iso_label="MEOW_$(date +%Y%m%d)"
iso_publisher="Ash"
iso_application="moonlightOS Meow v5 Live"
iso_version="${{ github.event.inputs.iso_version }}"
install_dir="meow"
buildmodes=('iso')
bootmodes=('bios.syslinux' 'uefi.systemd-boot')
arch="x86_64"
pacman_conf="pacman.conf"
airootfs_image_type="squashfs"
airootfs_image_tool_options=('-comp' '${{ github.event.inputs.compression }}' '-Xbcj' 'x86' '-b' '1M' '-Xdict-size' '1M')
bootstrap_tarball_compression=('zstd' '-c' '-T0' '--auto-threads=logical' '--long' '-19')

file_permissions=(
  ["/etc/shadow"]="0:0:400"
  ["/root"]="0:0:750"
  ["/root/.automated_script.sh"]="0:0:755"
  ["/root/.gnupg"]="0:0:700"
  ["/usr/local/bin/choose-mirror"]="0:0:755"
  ["/usr/local/bin/Installation_guide"]="0:0:755"
  ["/usr/local/bin/livecd-sound"]="0:0:755"
  ["/root/install.sh"]="0:0:755"
)
EOF

          # Add extra packages if provided
          if [ -n "${{ github.event.inputs.extra_packages }}" ]; then
            echo "" >> packages.x86_64
            echo "# Extra packages from workflow dispatch" >> packages.x86_64
            for pkg in ${{ github.event.inputs.extra_packages }}; do
              echo "$pkg" >> packages.x86_64
            done
          fi

          echo "=== Final profiledef.sh ==="
          cat profiledef.sh

          echo "=== Last 10 lines of packages.x86_64 ==="
          tail -10 packages.x86_64 || echo "packages.x86_64 not found"

      - name: Build ISO
        run: |
          mkdir -p out
          mkarchiso -v -w work/ -o out/ .

      - name: Rename ISO
        run: |
          ISO=$(ls out/*.iso | head -n 1)
          NEW_NAME="moonlightos-meow-v${{ github.event.inputs.iso_version }}-$(date +%Y%m%d)-x86_64.iso"
          mv "$ISO" "out/$NEW_NAME"
          echo "ISO_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "Built: $NEW_NAME"
          ls -lh out/

      - name: Upload ISO artifact
        if: ${{ github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlightos-meow-v${{ github.event.inputs.iso_version }}-${{ github.run_number }}
          path: out/*.iso
          retention-days: 7
