name: Build moonlightOS Meow ISO

on:
  workflow_dispatch:
    inputs:
      iso_version:
        description: 'ISO version'
        required: true
        default: '5.0'
      extra_packages:
        description: 'Extra packages to add (space-separated)'
        required: false
        default: ''
      compression:
        description: 'Squashfs compression'
        required: true
        default: 'xz'
        type: choice
        options:
          - xz
          - zstd
          - lz4
      upload_artifact:
        description: 'Upload ISO as artifact'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v5.0-meow

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git sudo dosfstools e2fsprogs libisoburn squashfs-tools

      - name: Inject build inputs
        run: |
          # Override iso_version in profiledef.sh
          sed -i 's/^iso_version=.*/iso_version="${{ github.event.inputs.iso_version }}"/' profiledef.sh

          # Override squashfs compression
          sed -i 's/-comp xz/-comp ${{ github.event.inputs.compression }}/' profiledef.sh

          # Append extra packages if provided
          if [ -n "${{ github.event.inputs.extra_packages }}" ]; then
            echo "" >> packages.x86_64
            echo "# Extra packages from workflow dispatch" >> packages.x86_64
            for pkg in ${{ github.event.inputs.extra_packages }}; do
              echo "$pkg" >> packages.x86_64
            done
          fi

          echo "=== profiledef.sh ==="
          cat profiledef.sh
          echo "=== Last 10 lines of packages.x86_64 ==="
          tail -10 packages.x86_64

      - name: Build ISO
        run: |
          mkdir -p out
          mkarchiso -v -w work/ -o out/ .

      - name: Rename ISO
        run: |
          ISO=$(ls out/*.iso)
          NEW_NAME="moonlightos-meow-v${{ github.event.inputs.iso_version }}-$(date +%Y%m%d)-x86_64.iso"
          mv "$ISO" "out/$NEW_NAME"
          echo "ISO_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "Built: $NEW_NAME"
          ls -lh out/

      - name: Upload ISO artifact
        if: ${{ github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlightos-meow-v${{ github.event.inputs.iso_version }}-${{ github.run_number }}
          path: out/*.iso
          retention-days: 7
