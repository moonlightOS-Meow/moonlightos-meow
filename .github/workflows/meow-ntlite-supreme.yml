name: 🪟 moonlightOS NTLite Supreme Build Pipeline

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: '🏷️ Build name/tag'
        required: true
        default: 'meow-ntlite-supreme'
      windows_version:
        description: '🪟 Windows base version'
        required: true
        default: '11'
        type: choice
        options:
          - '11'
          - '10'
      edition:
        description: '📦 Windows edition to debloat'
        required: true
        default: 'Pro'
        type: choice
        options:
          - Pro
          - Home
          - LTSC
      remove_telemetry:
        description: '🕵️ Nuke telemetry'
        required: true
        default: 'true'
        type: boolean
      remove_defender:
        description: '🛡️ Remove Windows Defender'
        required: true
        default: 'false'
        type: boolean
      install_glazewm:
        description: '🪟 Install GlazeWM tiling WM'
        required: true
        default: 'true'
        type: boolean
      install_zebar:
        description: '📊 Install Zebar status bar'
        required: true
        default: 'true'
        type: boolean
      install_cava:
        description: '🎵 Install CAVA visualizer'
        required: true
        default: 'true'
        type: boolean
      makka_pakka_wallpaper:
        description: '🪨 Set Makka Pakka as wallpaper (non-negotiable)'
        required: true
        default: 'true'
        type: boolean
      extra_packages:
        description: '📦 Extra winget packages (space-separated)'
        required: false
        default: ''
      build_iso:
        description: '💿 Build ISO with NTLite'
        required: true
        default: 'true'
        type: boolean
      upload_artifact:
        description: '⬆️ Upload build artifact'
        required: true
        default: 'true'
        type: boolean
      notify_lucyfer:
        description: '🐱 Notify Lucyfer (she will not approve)'
        required: true
        default: 'true'
        type: boolean

env:
  BUILD_NAME: ${{ github.event.inputs.build_name }}
  WINDOWS_VERSION: ${{ github.event.inputs.windows_version }}
  EDITION: ${{ github.event.inputs.edition }}

jobs:
  # ============================================================
  # JOB 1: Validate & Prepare
  # ============================================================
  validate:
    name: 🔍 Validate Build Configuration
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.gen_id.outputs.build_id }}
      timestamp: ${{ steps.gen_id.outputs.timestamp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: meow-ntlite

      - name: Generate Build ID
        id: gen_id
        run: |
          BUILD_ID="meow-ntlite-${{ github.event.inputs.windows_version }}-${{ github.event.inputs.edition }}-$(date +%Y%m%d-%H%M%S)"
          TIMESTAMP=$(date +%Y-%m-%d\ %H:%M:%S)
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "🆔 Build ID: $BUILD_ID"
          echo "🕐 Timestamp: $TIMESTAMP"

      - name: Validate inputs
        run: |
          echo "🔍 Validating build configuration..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🪟 Windows Version  : ${{ github.event.inputs.windows_version }}"
          echo "📦 Edition          : ${{ github.event.inputs.edition }}"
          echo "🏷️  Build Name       : ${{ github.event.inputs.build_name }}"
          echo "🕵️  Nuke Telemetry   : ${{ github.event.inputs.remove_telemetry }}"
          echo "🛡️  Remove Defender  : ${{ github.event.inputs.remove_defender }}"
          echo "🪟 GlazeWM          : ${{ github.event.inputs.install_glazewm }}"
          echo "📊 Zebar            : ${{ github.event.inputs.install_zebar }}"
          echo "🎵 CAVA             : ${{ github.event.inputs.install_cava }}"
          echo "🪨 Makka Pakka      : ${{ github.event.inputs.makka_pakka_wallpaper }}"
          echo "💿 Build ISO        : ${{ github.event.inputs.build_iso }}"
          echo "🐱 Notify Lucyfer   : ${{ github.event.inputs.notify_lucyfer }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ github.event.inputs.remove_defender }}" == "true" ]; then
            echo "⚠️  WARNING: Removing Windows Defender. You are on your own."
          fi

          if [ "${{ github.event.inputs.makka_pakka_wallpaper }}" == "false" ]; then
            echo "❌ FATAL: Makka Pakka wallpaper is non-negotiable."
            echo "Setting it to true regardless of your input."
          fi

          echo "✅ Configuration validated. Chaos authorized."

  # ============================================================
  # JOB 2: Notify Lucyfer
  # ============================================================
  notify_lucyfer:
    name: 🐱 Notify Lucyfer (Head of QA)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.notify_lucyfer == 'true' }}
    steps:
      - name: Send notification to Lucyfer
        run: |
          echo "🐱 Notifying Lucyfer (Head of QA)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Dear Lucyfer,"
          echo ""
          echo "A new moonlightOS Windows build has been initiated."
          echo "Build ID: ${{ needs.validate.outputs.build_id }}"
          echo ""
          echo "As Head of QA, your formal complaint has been noted."
          echo "Your disapproval has been logged."
          echo "The build will proceed anyway."
          echo ""
          echo "Regards,"
          echo "The moonlightOS Windows Gremlin"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐱 Lucyfer's response: *knocks build off the table*"
          echo "📋 Complaint #$(shuf -i 1000-9999 -n 1) filed successfully."

  # ============================================================
  # JOB 3: Generate NTLite Config
  # ============================================================
  generate_config:
    name: ⚙️ Generate NTLite Configuration
    runs-on: ubuntu-latest
    needs: [validate, notify_lucyfer]
    if: always() && needs.validate.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: meow-ntlite

      - name: Generate NTLite XML config
        run: |
          mkdir -p build-config
          cat > build-config/moonlightos-ntlite.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <!-- moonlightOS Meow NTLite Config -->
          <!-- Build: ${{ needs.validate.outputs.build_id }} -->
          <!-- Generated: ${{ needs.validate.outputs.timestamp }} -->
          <!-- Named by Lucyfer. Powered by chaos. Running on NTFS. -->
          <NTLite>
            <General>
              <BuildName>moonlightOS-Meow-NTLite-${{ github.event.inputs.edition }}</BuildName>
              <WindowsVersion>${{ github.event.inputs.windows_version }}</WindowsVersion>
              <Edition>${{ github.event.inputs.edition }}</Edition>
            </General>
            <Debloat>
              <RemoveTelemetry>${{ github.event.inputs.remove_telemetry }}</RemoveTelemetry>
              <RemoveDefender>${{ github.event.inputs.remove_defender }}</RemoveDefender>
              <RemoveCortana>true</RemoveCortana>
              <RemoveOneDrive>true</RemoveOneDrive>
              <RemoveEdge>false</RemoveEdge>
              <RemoveXbox>true</RemoveXbox>
              <RemoveTeams>true</RemoveTeams>
              <RemoveBloatApps>true</RemoveBloatApps>
            </Debloat>
            <Software>
              <GlazeWM>${{ github.event.inputs.install_glazewm }}</GlazeWM>
              <Zebar>${{ github.event.inputs.install_zebar }}</Zebar>
              <CAVA>${{ github.event.inputs.install_cava }}</CAVA>
              <MakkaPakkaWallpaper>true</MakkaPakkaWallpaper>
            </Software>
          </NTLite>
          EOF
          echo "✅ NTLite config generated"
          cat build-config/moonlightos-ntlite.xml

      - name: Generate winget package list
        run: |
          cat > build-config/packages.txt << EOF
          # moonlightOS Meow Windows Edition - Package List
          # Build: ${{ needs.validate.outputs.build_id }}

          # Core moonlightOS stack
          glaze-wm
          zebar
          cava-win

          # Dev tools
          Git.Git
          Microsoft.WindowsTerminal
          Neovim.Neovim

          # Extra packages from user input
          ${{ github.event.inputs.extra_packages }}
          EOF
          echo "✅ Package list generated"
          cat build-config/packages.txt

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntlite-config-${{ needs.validate.outputs.build_id }}
          path: build-config/
          retention-days: 30

  # ============================================================
  # JOB 4: Security Audit
  # ============================================================
  security_audit:
    name: 🔐 Security & Telemetry Audit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: meow-ntlite

      - name: Scan for Microsoft spyware
        run: |
          echo "🔐 Running telemetry audit..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          SPYWARE_LIST=(
            "DiagTrack"
            "dmwappushservice"
            "WMPNetworkSvc"
            "RemoteRegistry"
            "TrkWks"
            "WerSvc"
            "XblAuthManager"
            "XblGameSave"
            "XboxNetApiSvc"
            "Cortana"
            "OneDrive"
          )
          for service in "${SPYWARE_LIST[@]}"; do
            echo "🗑️  Marking for removal: $service"
          done
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Audit complete. Microsoft is not happy. We don't care."

      - name: Privacy report
        run: |
          echo "📊 Privacy Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Telemetry services to nuke    : 11"
          echo "Tracking registries to clear  : 47"
          echo "Cortana processes to kill     : all of them"
          echo "Microsoft's feelings hurt     : yes"
          echo "Lucyfer's approval            : pending (she's asleep)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Ready to nuke telemetry."

  # ============================================================
  # JOB 5: Build Simulation (since we can't run NTLite on Linux)
  # ============================================================
  build:
    name: 💿 Build moonlightOS NTLite Image
    runs-on: ubuntu-latest
    needs: [validate, generate_config, security_audit]
    if: ${{ github.event.inputs.build_iso == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: meow-ntlite

      - name: Download NTLite config
        uses: actions/download-artifact@v4
        with:
          name: ntlite-config-${{ needs.validate.outputs.build_id }}
          path: build-config/

      - name: Pre-build checks
        run: |
          echo "🔍 Pre-build checks..."
          echo "✅ NTLite config: found"
          echo "✅ Package list: found"
          echo "✅ Makka Pakka wallpaper: non-negotiable (always true)"
          echo "✅ Lucyfer's complaint: logged"
          echo "✅ NoVa V3: still dead"
          echo "✅ Chaos level: maximum"

      - name: Simulate NTLite build
        run: |
          echo "💿 Starting moonlightOS NTLite build..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Build ID  : ${{ needs.validate.outputs.build_id }}"
          echo "Base      : Windows ${{ github.event.inputs.windows_version }} ${{ github.event.inputs.edition }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "[1/7] Mounting Windows image..."
          sleep 2
          echo "       ✅ Image mounted"

          echo "[2/7] Removing telemetry services..."
          sleep 2
          echo "       ✅ Microsoft cried. We don't care."

          echo "[3/7] Debloating apps..."
          sleep 2
          echo "       ✅ Cortana: eliminated"
          echo "       ✅ Teams: gone"
          echo "       ✅ Xbox: purged"
          echo "       ✅ OneDrive: destroyed"

          echo "[4/7] Installing GlazeWM + Zebar..."
          sleep 2
          echo "       ✅ Tiling WM: installed"
          echo "       ✅ Status bar: configured"

          echo "[5/7] Installing CAVA visualizer..."
          sleep 2
          echo "       ✅ CAVA: installed (Windows shouldn't have this but here we are)"

          echo "[6/7] Setting Makka Pakka wallpaper..."
          sleep 2
          echo "       ✅ 🪨 Makka Pakka is watching over your desktop"

          echo "[7/7] Finalizing ISO..."
          sleep 2
          echo "       ✅ moonlightOS-Meow-NTLite-${{ github.event.inputs.edition }}.iso created"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Build complete! Long live the moon... even on NTFS."

      - name: Generate build manifest
        run: |
          mkdir -p dist
          cat > dist/BUILD_MANIFEST.txt << EOF
          ╔══════════════════════════════════════════════╗
          ║     moonlightOS Meow - Windows Edition       ║
          ║        "If you can't beat them,              ║
          ║              debloat them."                  ║
          ╚══════════════════════════════════════════════╝

          Build ID    : ${{ needs.validate.outputs.build_id }}
          Timestamp   : ${{ needs.validate.outputs.timestamp }}
          Base        : Windows ${{ github.event.inputs.windows_version }} ${{ github.event.inputs.edition }}
          Builder     : Ash (moonlightOS Windows Gremlin)
          QA          : Lucyfer (filed complaint #$(shuf -i 1000-9999 -n 1))

          COMPONENTS
          ──────────────────────────────────────────────
          GlazeWM tiling WM      : ${{ github.event.inputs.install_glazewm }}
          Zebar status bar       : ${{ github.event.inputs.install_zebar }}
          CAVA visualizer        : ${{ github.event.inputs.install_cava }}
          Makka Pakka wallpaper  : true (always true)
          Telemetry nuked        : ${{ github.event.inputs.remove_telemetry }}
          Defender removed       : ${{ github.event.inputs.remove_defender }}

          LORE
          ──────────────────────────────────────────────
          NoVa V3 status         : dead (730+ commits, 0 ISOs)
          Meow v4.0 status       : RIP (Fedora era)
          Meow v5.0 status       : alive (Arch, villain arc)
          Windows status         : temporary setback
          Linux return           : inevitable

          "I ALWAYS COME BACK" — Ash, 2026
          Named by Lucyfer. Powered by chaos. 🐱🌙
          EOF
          echo "✅ Build manifest generated"
          cat dist/BUILD_MANIFEST.txt

      - name: Upload build artifact
        if: ${{ github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.validate.outputs.build_id }}
          path: dist/
          retention-days: 7

  # ============================================================
  # JOB 6: Deploy Landing Page
  # ============================================================
  deploy_page:
    name: 🌐 Deploy Landing Page
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: always() && needs.validate.result == 'success'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: meow-ntlite

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # JOB 7: Post-build Report
  # ============================================================
  report:
    name: 📊 Post-Build Report
    runs-on: ubuntu-latest
    needs: [validate, notify_lucyfer, generate_config, security_audit, build]
    if: always()
    steps:
      - name: Generate final report
        run: |
          echo "📊 moonlightOS NTLite Build Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Build ID   : ${{ needs.validate.outputs.build_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "validate        : ${{ needs.validate.result }}"
          echo "notify_lucyfer  : ${{ needs.notify_lucyfer.result }}"
          echo "generate_config : ${{ needs.generate_config.result }}"
          echo "security_audit  : ${{ needs.security_audit.result }}"
          echo "build           : ${{ needs.build.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐱 Lucyfer's final verdict: *walks away*"
          echo "🪨 Makka Pakka: Akka Wakka Mikka Makka Moo"
          echo "🌙 Long live moonlightOS. Even on Windows."
