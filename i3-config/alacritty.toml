# moonlightOS Meow v4.0-pre — Alacritty Terminal Config
# Style: Soft Red on near-black

[window]
padding = { x = 12, y = 10 }
decorations = "none"
opacity = 0.92
title = "moonlightOS Terminal"
dynamic_title = true

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
bold   = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
size   = 11.0

[colors.primary]
background = "#0D0D0D"
foreground = "#F0F0F0"

[colors.cursor]
text   = "#0D0D0D"
cursor = "#C0392B"

[colors.normal]
black   = "#1A1A1A"
red     = "#C0392B"
green   = "#27AE60"
yellow  = "#F39C12"
blue    = "#2980B9"
magenta = "#8E44AD"
cyan    = "#16A085"
white   = "#BDC3C7"

[colors.bright]
black   = "#2C2C2C"
red     = "#E74C3C"
green   = "#2ECC71"
yellow  = "#F1C40F"
blue    = "#3498DB"
magenta = "#9B59B6"
cyan    = "#1ABC9C"
white   = "#ECF0F1"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[scrolling]
history    = 10000
multiplier = 3
