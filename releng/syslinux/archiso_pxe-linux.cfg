LABEL moonlight_nbd
TEXT HELP
Boot the moonlightOS v7.0 install medium using NBD.
It allows you to install moonlightOS or perform system maintenance.
ENDTEXT
MENU LABEL moonlightOS v7.0 (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

LABEL moonlight_nfs
TEXT HELP
