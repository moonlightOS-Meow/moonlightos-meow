<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="moonGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg circle -->
  <circle cx="32" cy="32" r="30" fill="#06030f"/>
  <!-- crescent moon -->
  <circle cx="32" cy="32" r="18" fill="url(#moonGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="26" r="14" fill="#06030f"/>
  <!-- cat ears on moon -->
  <polygon points="22,18 18,10 26,14" fill="#c084fc"/>
  <polygon points="22,18 19,11 25,15" fill="#f472b6" opacity="0.6"/>
  <polygon points="30,16 27,8 34,13" fill="#c084fc"/>
  <polygon points="30,16 28,9 33,14" fill="#f472b6" opacity="0.6"/>
</svg>
